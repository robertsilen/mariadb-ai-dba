<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MariaDB Server Inventory</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 15px; line-height: 1.6; color: #222; max-width: 1100px; margin: 0 auto; padding: 24px; background: #f9f9f9; }
  h1 { font-size: 1.8em; border-bottom: 3px solid #003366; padding-bottom: 10px; color: #003366; }
  h2 { font-size: 1.3em; color: #003366; border-bottom: 1px solid #cce; margin-top: 40px; padding-bottom: 4px; }
  h3 { font-size: 1.1em; color: #224; margin-top: 24px; }
  h4 { font-size: 1em; color: #446; margin-top: 16px; }
  .meta { background: #003366; color: #fff; padding: 14px 20px; border-radius: 6px; margin-bottom: 28px; font-size: 0.95em; }
  .meta strong { color: #adf; }
  .meta a { color: #adf; }
  table { border-collapse: collapse; width: 100%; margin: 12px 0 20px 0; font-size: 0.93em; }
  th { background: #003366; color: #fff; padding: 8px 12px; text-align: left; font-weight: 600; }
  td { padding: 7px 12px; border-bottom: 1px solid #dde; vertical-align: top; }
  tr:nth-child(even) td { background: #f4f4f9; }
  tr:hover td { background: #eef; }
  code { font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; font-size: 0.88em; background: #eef; padding: 1px 5px; border-radius: 3px; }
  pre { font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; font-size: 0.88em; background: #1e2433; color: #c9d1d9; padding: 14px 18px; border-radius: 6px; overflow-x: auto; line-height: 1.5; }
  pre code { background: none; padding: 0; }
  .badge { display: inline-block; padding: 2px 9px; border-radius: 12px; font-size: 0.82em; font-weight: 700; letter-spacing: 0.03em; }
  .critical { background: #fde; color: #000; }
  .high { background: #fef0e4; color: #000; }
  .medium { background: #fdf9e4; color: #000; }
  .low { background: #edfeed; color: #000; }
  .finding { border-left: 4px solid #ccc; padding: 12px 16px; margin: 14px 0; border-radius: 0 6px 6px 0; background: #fff; }
  .finding.critical { border-left-color: #c00; background: #fff5f5; }
  .finding.high { border-left-color: #e06600; background: #fff8f2; }
  .finding.medium { border-left-color: #d4a017; background: #fffdf0; }
  .finding.low { border-left-color: #2a7a2a; background: #f4fff4; }
  .finding h4 { margin: 0 0 8px 0; }
  .summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin: 16px 0; }
  .summary-card { padding: 14px; border-radius: 8px; text-align: center; }
  .summary-card.critical { background: #fde; border: 2px solid #c00; }
  .summary-card.high { background: #fef0e4; border: 2px solid #e06600; }
  .summary-card.medium { background: #fdf9e4; border: 2px solid #d4a017; }
  .summary-card.low { background: #edfeed; border: 2px solid #2a7a2a; }
  .summary-card .count { font-size: 2.2em; font-weight: 800; line-height: 1.1; color: #000; }
  .summary-card .label { font-size: 0.85em; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-top: 4px; color: #000; }
  .summary-card .top { font-size: 0.8em; margin-top: 8px; color: #555; }
  .delta-changed { color: #c05; font-weight: 600; }
  .delta-unchanged { color: #999; }
  .note { background: #e8f0fe; border-left: 4px solid #4285f4; padding: 10px 14px; margin: 12px 0; border-radius: 0 6px 6px 0; font-size: 0.93em; }
  .section-intro { color: #555; font-size: 0.95em; margin: 4px 0 16px 0; }
  hr { border: none; border-top: 1px solid #dde; margin: 32px 0; }
  a { color: #1a56c8; }
  @media print { body { background: #fff; } .meta { print-color-adjust: exact; -webkit-print-color-adjust: exact; } th { print-color-adjust: exact; -webkit-print-color-adjust: exact; } .badge { print-color-adjust: exact; -webkit-print-color-adjust: exact; } .summary-card { print-color-adjust: exact; -webkit-print-color-adjust: exact; } }
</style>
</head>
<body>
